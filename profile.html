    <script>

        const repoName = "Bazaar-Odisha";
        const isGitHub = window.location.hostname.includes("github.io");

        base.href = isGitHub ? `/${repoName}/` : "/";

    <div id="overlay" class="fixed inset-0 bg-black opacity-0 pointer-events-none transition-opacity duration-300 z-[90]"></div>

    <!-- Top Bar (Header) -->
    <header class="bg-white sticky top-0 z-50 shadow-sm p-3 flex items-center justify-between">
        <a href="home.html" class="flex items-center gap-2">
            <img src="images/app_logo.png" alt="Bazaar Odisha Logo" class="h-8 w-auto"/>
            <span class="text-xl font-bold text-indigo-600">Bazaar Odisha</span>
        </a>
        <button id="open-menu-btn" class="text-gray-600 hover:text-gray-800"><svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"></path></svg></button>
    </header>

    <!-- Main content area -->
    <main class="flex-grow p-4 md:p-6 mb-20 overflow-y-auto">
        <!-- Profile Header -->
        <div class="flex items-center gap-4 p-4 bg-white rounded-xl shadow mb-6">
            <!-- This image src will be updated by the script -->
            <img id="profile-image" src="" alt="User Avatar" class="w-20 h-20 rounded-full border-4 border-indigo-100 object-cover flex-shrink-0"/>
            <div>
                <h2 id="profile-name" class="text-2xl font-bold text-gray-900">Loading...</h2>
                <p id="profile-email" class="text-gray-500">loading...</p>
            </div>
        </div>

        <!-- Stats Section -->
        <div class="grid grid-cols-2 gap-4 mb-6">
            <a href="wishlist.html" class="bg-white p-4 rounded-xl shadow text-center hover:bg-gray-50"><p id="wishlist-count" class="text-2xl font-bold text-indigo-600">0</p><p class="text-sm text-gray-500">Items in Wishlist</p></a>
            <div class="bg-white p-4 rounded-xl shadow text-center"><p class="text-2xl font-bold text-indigo-600">0</p><p class="text-sm text-gray-500">Orders</p></div>
        </div>

        <!-- Menu Links Section -->
        <div class="bg-white rounded-xl shadow">
            <ul class="divide-y divide-gray-200">
                <li><a href="wishlist.html" class="flex items-center justify-between p-4 hover:bg-gray-50 rounded-t-xl"><div class="flex items-center space-x-4"><svg class="w-6 h-6 text-gray-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4.318 6.318a4.5 4.5 0 000 6.364L12 20.364l7.682-7.682a4.5 4.5 0 00-6.364-6.364L12 7.636l-1.318-1.318a4.5 4.5 0 00-6.364 0z"></path></svg><span>My Wishlist</span></div><svg class="w-5 h-5 text-gray-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7"></path></svg></a></li>
                <li><a href="settings.html" class="flex items-center justify-between p-4 hover:bg-gray-50"><div class="flex items-center space-x-4"><svg class="w-6 h-6 text-gray-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.065 2.572c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.572 1.065c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.065-2.572c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z"></path><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"></path></svg><span>Settings</span></div><svg class="w-5 h-5 text-gray-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7"></path></svg></a></li>
                <li><a href="contact.html" class="flex items-center justify-between p-4 hover:bg-gray-50 rounded-b-xl"><div class="flex items-center space-x-4"><svg class="w-6 h-6 text-gray-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8.228 9c.549-1.165 2.03-2 3.772-2 2.21 0 4 1.343 4 3 0 1.4-1.278 2.575-3.006 2.907-.542.104-.994.54-.994 1.093m0 3h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg><span>Help & Support</span></div><svg class="w-5 h-5 text-gray-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7"></path></svg></a></li>

        <!-- Logout Button -->
        <div class="mt-8">

    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>

    <script>
      const firebaseConfig = {
        apiKey: "AIzaSyCtKssk0Ffo0ylSQF4hnhkffQmX-C-vQOE",
        authDomain: "bazzar-odisha.firebaseapp.com",
        projectId: "bazzar-odisha",
        storageBucket: "bazzar-odisha.appspot.com",
        messagingSenderId: "441459698881",
        appId: "1:441459698881:web:09f7cfe94ffd5b9f40b840",
      };
      firebase.initializeApp(firebaseConfig);
      const auth = firebase.auth();

      // DOM Elements
      const openMenuBtn = document.getElementById("open-menu-btn");
      const closeMenuBtn = document.getElementById("close-menu-btn");
      const hamburgerMenu = document.getElementById("hamburger-menu");
      const overlay = document.getElementById("overlay");
      const wishlistCountElement = document.getElementById("wishlist-count");
      const profileImage = document.getElementById('profile-image');
      const profileName = document.getElementById('profile-name');
      const profileEmail = document.getElementById('profile-email');
      const logoutBtn = document.getElementById('logout-btn');

      // --- Core Authentication Guard ---
      auth.onAuthStateChanged(user => {
        if (user) {
          document.body.style.opacity = '1';

          // Populate user data
          profileName.textContent = user.displayName || 'Anonymous User';
          profileEmail.textContent = user.email || 'No email provided';
          
          // UPDATED: Use Google Photo URL if available, otherwise use placeholder
          if (user.photoURL) {
            profileImage.src = user.photoURL;
          } else {
            profileImage.src = 'https://placehold.co/128x128/6366f1/ffffff?text=ME';
          }
          
          initializePage();
        } else {
          window.location.replace("login.html");
        }
      });
      
      function logoutUser() {
        auth.signOut().catch(error => {
          console.error("Error signing out:", error);
          alert("Error signing out.");
        });
      }
      
      function initializePage() {
        openMenuBtn.addEventListener("click", toggleHamburgerMenu);
        closeMenuBtn.addEventListener("click", toggleHamburgerMenu);
        overlay.addEventListener("click", toggleHamburgerMenu);
        logoutBtn.addEventListener("click", logoutUser);

        const wishlist = JSON.parse(localStorage.getItem("wishlist")) || [];
        if (wishlistCountElement) {
          wishlistCountElement.textContent = wishlist.length;
        }
      }

      function toggleHamburgerMenu() {
        hamburgerMenu.classList.toggle("-translate-x-full");
        overlay.classList.toggle("opacity-0");
        overlay.classList.toggle("pointer-events-none");
        overlay.classList.toggle("opacity-50");
      }
    </script>
  </body>
</html>
