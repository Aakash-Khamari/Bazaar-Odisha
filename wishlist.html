    <!-- Load data files -->

    <script>
      const servicesContainer = document.getElementById(
        "wishlisted-services-container"
      );
      const productsContainer = document.getElementById(
        "wishlisted-products-container"
      );
      const openMenuBtn = document.getElementById("open-menu-btn");
      const closeMenuBtn = document.getElementById("close-menu-btn");
      const hamburgerMenu = document.getElementById("hamburger-menu");
      const overlay = document.getElementById("overlay");

      function removeFromWishlist(id, type) {
        let wishlist = JSON.parse(localStorage.getItem("wishlist")) || [];
        // Filter out the item to remove
        wishlist = wishlist.filter(
          (item) => !(item.id === id && item.type === type)
        );
        localStorage.setItem("wishlist", JSON.stringify(wishlist));
        // Re-render the page to reflect the change
        loadWishlist();
      }

      function renderServices(services) {
        if (services.length === 0) {
          servicesContainer.innerHTML = `<div class="bg-white rounded-xl p-6 text-center text-gray-500">You haven't wishlisted any services yet.</div>`;
          return;
        }
        servicesContainer.innerHTML = "";
        services.forEach((service) => {
          const card = `
                    <div class="bg-white rounded-xl shadow-md p-4 flex items-start gap-4">
                        <a href="service-detail.html?id=${service.id}" class="flex-shrink-0">
                            <img src="${service.image}" alt="${service.name}" class="w-20 h-20 rounded-lg object-cover">
                        </a>
                        <div class="flex-grow min-w-0">
                            <a href="service-detail.html?id=${service.id}" class="block">
                                <h4 class="text-lg font-semibold text-gray-900 truncate">${service.name}</h4>
                                <p class="text-sm text-gray-500 truncate">${service.category} | ${service.location}</p>
                            </a>
                            <p class="text-sm text-gray-600 mt-2 truncate">${service.description}</p>
                        </div>
                        <button onclick="removeFromWishlist(${service.id}, 'service')" class="flex-shrink-0 p-1 text-gray-400 hover:text-red-500" title="Remove from Wishlist">
                            <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"></path></svg>
                        </button>
                    </div>
                `;
          servicesContainer.innerHTML += card;
        });
      }

      function renderProducts(products) {
        if (products.length === 0) {
          productsContainer.innerHTML = `<div class="col-span-full bg-white rounded-xl p-6 text-center text-gray-500">You haven't wishlisted any products yet.</div>`;
          return;
        }
        productsContainer.innerHTML = "";
        products.forEach((product) => {
          const card = `
                    <div class="bg-white rounded-xl shadow-md overflow-hidden group">
                        <a href="product-detail.html?id=${product.id}" class="block">
                            <img src="${product.images[0]}" alt="${product.name}" class="w-full h-32 object-cover">
                            <div class="p-3">
                                <h4 class="text-sm font-semibold text-gray-900 truncate">${product.name}</h4>
                                <p class="text-md font-bold text-indigo-600">₹${product.price}</p>
                            </div>
                        </a>
                        <button onclick="removeFromWishlist(${product.id}, 'product')" class="w-full text-center py-2 bg-red-500 text-white text-sm font-semibold hover:bg-red-600">Remove</button>
                    </div>
                `;
          productsContainer.innerHTML += card;
        });
      }

      function loadWishlist() {
        const wishlistItems =
          JSON.parse(localStorage.getItem("wishlist")) || [];

        const wishlistedServices = [];
        const wishlistedProducts = [];

        wishlistItems.forEach((item) => {
          if (item.type === "service") {
            const service = servicesData.find((s) => s.id === item.id);
            if (service) wishlistedServices.push(service);
          } else if (item.type === "product") {
            const product = bazaarProducts.find((p) => p.id === item.id);
            if (product) wishlistedProducts.push(product);
          }
        });

        renderServices(wishlistedServices);
        renderProducts(wishlistedProducts);
      }

      // --- HAMBURGER MENU LOGIC ---
      function toggleHamburgerMenu() {
        hamburgerMenu.classList.toggle("-translate-x-full");
        overlay.classList.toggle("opacity-0");
        overlay.classList.toggle("pointer-events-none");
        overlay.classList.toggle("opacity-50");
      }
      openMenuBtn.addEventListener("click", toggleHamburgerMenu);
      closeMenuBtn.addEventListener("click", toggleHamburgerMenu);
      overlay.addEventListener("click", toggleHamburgerMenu);

      // --- INITIAL PAGE LOAD ---
      document.addEventListener("DOMContentLoaded", () => {
        loadWishlist();
      });
    </script>
