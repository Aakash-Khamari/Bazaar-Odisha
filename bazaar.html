<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Bazaar Odisha - Products</title>

    <!-- DYNAMIC BASE TAG (Permanent Fix) -->
    <script>
      (function () {
        const repoName = "Bazaar-Odisha"; // Your repository name
        const isGitHub = window.location.hostname.includes("github.io");
        const base = document.createElement("base");
        base.href = isGitHub ? `/${repoName}/` : "/";
        document.head.prepend(base);
      })();
    </script>

    <!-- Tailwind CSS CDN for modern styling -->
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
      @import url("https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap");
      body {
        font-family: "Inter", sans-serif;
        background-color: #f3f4f6;
      }
      .nav-btn.active {
        color: #4f46e5;
        border-top: 2px solid #4f46e5;
      }
      .nav-btn:not(.active) {
        color: #6b7280;
      }
      .nav-btn:hover:not(.active) {
        color: #4f46e5;
      }
      /* Minor style for filter selects */
      select {
        -webkit-appearance: none;
        -moz-appearance: none;
        appearance: none;
        background-image: url('data:image/svg+xml;charset=UTF-8,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 20 20" fill="currentColor"><path fill-rule="evenodd" d="M10 12l-5-5h10l-5 5z" clip-rule="evenodd" /></svg>');
        background-repeat: no-repeat;
        background-position: right 0.5rem center;
        background-size: 1.25em 1.25em;

        </li>
        <li>

            href="wishlist.html"
            class="flex items-center space-x-3 text-gray-700 hover:text-indigo-600"

        </li>
        <li class="border-t my-4"></li>
        <li>
          <a

    </nav>
    <div

    <!-- **UPDATED** Top Bar (Header) -->
    <header
      class="bg-white sticky top-0 z-50 shadow-sm p-3 flex items-center justify-between"
    >
      <!-- Left side: Logo and App Name (links to home) -->
      <a href="index.html" class="flex items-center gap-2">
        <img
          src="images/app_logo.png"
          alt="Bazaar Odisha Logo"
          class="h-8 w-auto"
        />
        <span class="text-xl font-bold text-indigo-600">Bazaar Odisha</span>
      </a>

      <!-- Right side: Hamburger Menu Button -->
      <button id="open-menu-btn" class="text-gray-600 hover:text-gray-800">
        <svg
          class="w-6 h-6"
          fill="none"
          stroke="currentColor"
          viewBox="0 0 24 24"
        >
          <path
            stroke-linecap="round"
            stroke-linejoin="round"
            stroke-width="2"
            d="M4 6h16M4 12h16M4 18h16"
          ></path>
        </svg>
      </button>
    </header>

    <!-- Main content area -->
    <main class="flex-grow p-4 md:p-6 mb-20 overflow-y-auto">
      <section class="mb-6">
        <h2 class="text-2xl font-bold text-gray-900 mb-2">Bazaar Products</h2>
        <p class="text-gray-600 mb-6">
          Explore authentic products from local SHGs and vendors.
        </p>

        <div class="bg-white rounded-xl shadow p-4 mb-6 sticky top-[72px] z-40">
          <div class="mb-4">
            <input
              type="text"
              id="search-input"
              placeholder="Search by product, category, or vendor"
              class="w-full px-4 py-2 rounded-full border-2 border-gray-200 focus:outline-none focus:border-indigo-500 text-sm"
            />
          </div>
          <div class="grid grid-cols-1 md:grid-cols-3 gap-4">
            <div>
              <label
                for="category-filter"
                class="text-sm font-medium text-gray-700"
                >Category</label
              >
              <select
                id="category-filter"
                class="mt-1 block w-full pl-3 pr-10 py-2 text-base border-gray-300 focus:outline-none focus:ring-indigo-500 focus:border-indigo-500 sm:text-sm rounded-md"
              ></select>
            </div>
            <div>
              <label
                for="vendor-filter"
                class="text-sm font-medium text-gray-700"
                >Vendor</label
              >
              <select
                id="vendor-filter"
                class="mt-1 block w-full pl-3 pr-10 py-2 text-base border-gray-300 focus:outline-none focus:ring-indigo-500 focus:border-indigo-500 sm:text-sm rounded-md"
              ></select>
            </div>
            <div class="flex items-end">
              <button
                id="clear-filters-btn"
                class="w-full bg-gray-200 hover:bg-gray-300 text-gray-800 font-medium py-2 px-4 rounded-md text-sm"
              >
                Clear Filters
              </button>
            </div>
          </div>
        </div>

        <!-- Product Listings Container -->
        <div
          id="product-listings-container"
          class="grid grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-4"
        ></div>
      </section>
    </main>

    <!-- **UPDATED** Bottom Navigation Bar -->
    <nav class="fixed bottom-0 left-0 right-0 bg-white shadow-lg z-50">
      <div class="grid grid-cols-5 h-16">
        <a

          class="nav-btn flex flex-col items-center justify-center pt-2 pb-1"
        >
          <svg class="h-6 w-6" fill="currentColor" viewBox="0 0 20 20">
            <path
              d="M10.707 2.293a1 1 0 00-1.414 0l-7 7a1 1 0 001.414 1.414L4 10.414V17a1 1 0 001 1h2a1 1 0 001-1v-2a1 1 0 011-1h2a1 1 0 011 1v2a1 1 0 001 1h2a1 1 0 001-1v-6.586l.293.293a1 1 0 001.414-1.414l-7-7z"
            ></path>
          </svg>
          <span class="text-xs mt-1">Home</span>
        </a>
        <a
          href="services.html"
          class="nav-btn flex flex-col items-center justify-center pt-2 pb-1"
        >
          <svg
            class="h-6 w-6"
            fill="none"
            stroke="currentColor"
            viewBox="0 0 24 24"
          >
            <path
              stroke-linecap="round"
              stroke-linejoin="round"
              stroke-width="2"
              d="M21 13.255A23.931 23.931 0 0112 15c-3.183 0-6.22-1.206-8.255-3.255m16.51 0a23.931 23.931 0 01-16.51 0m16.51 0v-.255a2 2 0 00-2-2h-13a2 2 0 00-2 2v.255m0 0a2 2 0 01-2 2h-1a2 2 0 01-2-2v-.255a23.931 23.931 0 01-16.51 0m0 0v-.255a2 2 0 012-2h13a2 2 0 012 2v.255"
            ></path>
          </svg>
          <span class="text-xs mt-1">Services</span>
        </a>
        <a
          href="bazaar.html"
          class="nav-btn flex flex-col items-center justify-center pt-2 pb-1 active"
        >
          <svg
            class="h-6 w-6"
            fill="none"
            stroke="currentColor"
            viewBox="0 0 24 24"
          >
            <path
              stroke-linecap="round"
              stroke-linejoin="round"
              stroke-width="2"
              d="M3 3h2l.4 2M7 13h10l4-8H5.4M7 13L5.4 5M7 13l-2.293 2.293c-.63.63-.182 1.706.707 1.706H17m0 0a2 2 0 100 4 2 2 0 000-4zm-8 2a2 2 0 11-4 0 2 2 0 014 0z"
            ></path>
          </svg>
          <span class="text-xs mt-1">Bazaar Cart</span>
        </a>
        <a
          href="shg.html"
          class="nav-btn flex flex-col items-center justify-center pt-2 pb-1"
        >
          <svg
            class="h-6 w-6"
            fill="none"
            stroke="currentColor"
            viewBox="0 0 24 24"
          >
            <path
              stroke-linecap="round"
              stroke-linejoin="round"
              stroke-width="2"
              d="M17 20v-2a2 2 0 00-2-2H9a2 2 0 00-2 2v2M7 14h10M7 10h10M4 7h16M4 4h16a2 2 0 012 2v12a2 2 0 01-2 2H4a2 2 0 01-2-2V6a2 2 0 012-2z"
            ></path>

        <a

        >

            stroke="currentColor"
            viewBox="0 0 24 24"
          >
            <path
              stroke-linecap="round"
              stroke-linejoin="round"
              stroke-width="2"
              d="M8 10h.01M12 10h.01M16 10h.01M9 16H5a2 2 0 01-2-2V6a2 2 0 012-2h14a2 2 0 012 2v8a2 2 0 01-2 2h-5l-5 5v-5z"

    <!-- Load data files -->
    <script src="bazaar_data.js"></script>
    <script>
      const productListingsContainer = document.getElementById(
        "product-listings-container"
      );
      const searchInput = document.getElementById("search-input");
      const categoryFilter = document.getElementById("category-filter");
      const vendorFilter = document.getElementById("vendor-filter");
      const clearFiltersBtn = document.getElementById("clear-filters-btn");
      const openMenuBtn = document.getElementById("open-menu-btn");
      const closeMenuBtn = document.getElementById("close-menu-btn");
      const hamburgerMenu = document.getElementById("hamburger-menu");
      const overlay = document.getElementById("overlay");

      // --- UNIFIED WISHLIST LOGIC ---
      function getWishlist() {
        return JSON.parse(localStorage.getItem("wishlist")) || [];
      }

      function saveWishlist(wishlist) {
        localStorage.setItem("wishlist", JSON.stringify(wishlist));
      }

      function toggleWishlist(productId) {
        let wishlist = getWishlist();
        const itemIndex = wishlist.findIndex(
          (item) => item.id === productId && item.type === "product"
        );

        if (itemIndex > -1) {
          wishlist.splice(itemIndex, 1); // Remove
        } else {
          wishlist.push({ id: productId, type: "product" }); // Add
        }
        saveWishlist(wishlist);
        applyFiltersAndSearch(); // Re-render to update the heart icon
      }

      // --- RENDER & FILTER FUNCTIONS ---
      function renderProductListings(data) {
        const wishlist = getWishlist();
        productListingsContainer.innerHTML = "";
        if (data.length === 0) {
          productListingsContainer.innerHTML = `<div class="col-span-full text-center p-8 bg-white rounded-xl shadow"><p class="text-gray-600">No products found.</p></div>`;
          return;
        }
        data.forEach((product) => {
          const vendor = shgVendors.find((v) => v.id === product.vendorId);
          const vendorName = vendor ? vendor.name : "Unknown Vendor";
          const isInWishlist = wishlist.some(
            (item) => item.id === product.id && item.type === "product"
          );

          const card = `
                    <div class="bg-white rounded-xl shadow-md overflow-hidden flex flex-col">
                        <a href="product-detail.html?id=${
                          product.id
                        }" class="block relative">
                            <img src="${product.images[0]}" alt="${
            product.name
          }" class="w-full h-32 object-cover">
                            <button onclick="event.preventDefault(); event.stopPropagation(); toggleWishlist(${
                              product.id
                            })" class="absolute top-2 right-2 bg-white/70 p-1.5 rounded-full z-10" title="Add to Wishlist">
                                ${
                                  isInWishlist
                                    ? `<svg class="w-5 h-5 text-red-500" fill="currentColor" viewBox="0 0 20 20"><path fill-rule="evenodd" d="M3.172 5.172a4 4 0 015.656 0L10 6.343l1.172-1.171a4 4 0 115.656 5.656L10 17.657l-6.828-6.829a4 4 0 010-5.656z" clip-rule="evenodd"></path></svg>`
                                    : `<svg class="w-5 h-5 text-gray-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4.318 6.318a4.5 4.5 0 000 6.364L12 20.364l7.682-7.682a4.5 4.5 0 00-6.364-6.364L12 7.636l-1.318-1.318a4.5 4.5 0 00-6.364 0z"></path></svg>`
                                }
                            </button>
                        </a>
                        <div class="p-3 flex flex-col flex-grow">
                            <a href="product-detail.html?id=${
                              product.id
                            }" class="flex-grow">
                                <h4 class="text-sm font-semibold text-gray-900 truncate">${
                                  product.name
                                }</h4>
                                <p class="text-xs text-gray-500 truncate">${vendorName}</p>
                            </a>
                            <div class="flex items-center justify-between mt-2">
                                <p class="text-md font-bold text-indigo-600">₹${
                                  product.price
                                }</p>
                            </div>
                        </div>
                    </div>`;
          productListingsContainer.innerHTML += card;
        });
      }

      function populateFilters() {
        const categories = [
          ...new Set(bazaarProducts.map((p) => p.category)),
        ].sort();
        const vendors = [
          ...new Set(shgVendors.map((v) => ({ id: v.id, name: v.name }))),
        ].sort((a, b) => a.name.localeCompare(b.name));

        categoryFilter.innerHTML =
          '<option value="">All Categories</option>' +
          categories.map((c) => `<option value="${c}">${c}</option>`).join("");
        vendorFilter.innerHTML =
          '<option value="">All Vendors</option>' +
          vendors
            .map((v) => `<option value="${v.id}">${v.name}</option>`)
            .join("");
      }

      function applyFiltersAndSearch() {
        const searchQuery = searchInput.value.toLowerCase();
        const selectedCategory = categoryFilter.value;
        const selectedVendorId = vendorFilter.value
          ? parseInt(vendorFilter.value)
          : null;

        let filteredData = bazaarProducts.filter((product) => {
          const vendorName =
            shgVendors
              .find((v) => v.id === product.vendorId)
              ?.name.toLowerCase() || "";
          const matchesSearch =
            product.name.toLowerCase().includes(searchQuery) ||
            product.description.toLowerCase().includes(searchQuery) ||
            product.category.toLowerCase().includes(searchQuery) ||
            vendorName.includes(searchQuery);

          const matchesCategory =
            !selectedCategory || product.category === selectedCategory;
          const matchesVendor =
            !selectedVendorId || product.vendorId === selectedVendorId;

          return matchesSearch && matchesCategory && matchesVendor;
        });

        renderProductListings(filteredData);
      }

      // --- EVENT LISTENERS ---
      searchInput.addEventListener("input", applyFiltersAndSearch);
      categoryFilter.addEventListener("change", applyFiltersAndSearch);
      vendorFilter.addEventListener("change", applyFiltersAndSearch);

      clearFiltersBtn.addEventListener("click", () => {
        searchInput.value = "";
        categoryFilter.value = "";
        vendorFilter.value = "";
        applyFiltersAndSearch();
      });

      // --- HAMBURGER MENU LOGIC ---
      function toggleHamburgerMenu() {
        hamburgerMenu.classList.toggle("-translate-x-full");
        overlay.classList.toggle("opacity-0");
        overlay.classList.toggle("pointer-events-none");
        overlay.classList.toggle("opacity-50");
      }
      openMenuBtn.addEventListener("click", toggleHamburgerMenu);
      closeMenuBtn.addEventListener("click", toggleHamburgerMenu);
      overlay.addEventListener("click", toggleHamburgerMenu);

      // --- INITIAL PAGE LOAD ---
      document.addEventListener("DOMContentLoaded", () => {
        populateFilters();
        applyFiltersAndSearch();
      });
    </script>
  </body>
</html>
