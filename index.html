<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bazaar Odisha</title>
    <!-- Dynamic base tag -->
    <script>
        (function() {
            const repoName = 'Bazaar-Odisha';
            const isGitHub = window.location.hostname.includes('github.io');
            const base = document.createElement('base');
            base.href = isGitHub ? `/${repoName}/` : '/';
            document.head.prepend(base);
        })();
    </script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { transition: opacity 0.5s ease-in-out; }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        .progress-circle {
            border: 4px solid rgba(255, 255, 255, 0.3);
            border-top: 4px solid #ffffff;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1.5s linear infinite;
        }
    </style>
</head>
<body class="bg-indigo-600 flex items-center justify-center h-screen">

    <div class="text-center">
        <img src="images/ic_launcher.png" alt="Bazaar Odisha Logo" class="h-24 w-auto mx-auto mb-4">
        <h1 class="text-white text-4xl font-bold">Bazaar Odisha</h1>
        <div class="mt-8 mx-auto progress-circle"></div>
    </div>
    
    <!-- Firebase SDKs -->
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>

    <script>
        // --- Configuration ---
        const firebaseConfig = {
            apiKey: "AIzaSyCtKssk0Ffo0ylSQF4hnhkffQmX-C-vQOE",
            authDomain: "bazzar-odisha.firebaseapp.com",
            projectId: "bazzar-odisha",
            storageBucket: "bazzar-odisha.appspot.com",
            messagingSenderId: "441459698881",
            appId: "1:441459698881:web:09f7cfe94ffd5b9f40b840"
        };
        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();

        // --- Improved Splash Screen Logic ---
        const minSplashTime = 2000; // 2 seconds minimum
        const fadeOutTime = 500;   // 0.5 second fade

        // State variables to track completion
        let isAuthCheckComplete = false;
        let isMinTimeElapsed = false;
        let destinationUrl = 'login.html'; // Default destination

        // Function to attempt navigation
        function tryNavigate() {
            // Only navigate if both auth check is done AND min time has passed
            if (isAuthCheckComplete && isMinTimeElapsed) {
                document.body.style.opacity = '0';
                setTimeout(() => {
                    window.location.replace(destinationUrl);
                }, fadeOutTime);
            }
        }

        // 1. Start the timer for the minimum splash duration
        setTimeout(() => {
            isMinTimeElapsed = true;
            tryNavigate();
        }, minSplashTime);

        // 2. Start the authentication check immediately
        auth.onAuthStateChanged((user) => {
            isAuthCheckComplete = true;
            if (user) {
                // User is logged in, set destination to home
                destinationUrl = 'home.html';
            } else {
                // User is not logged in, destination remains login
                destinationUrl = 'login.html';
            }
            tryNavigate();
        });
    </script>
</body>
</html>
