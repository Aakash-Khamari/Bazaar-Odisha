<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Bazaar Odisha - Service Details</title>

    <!-- DYNAMIC BASE TAG (Permanent Fix) -->
    <script>
      (function () {
        const repoName = "Bazaar-Odisha"; // Your repository name
        const isGitHub = window.location.hostname.includes("github.io");
        const base = document.createElement("base");
        base.href = isGitHub ? `/${repoName}/` : "/";
        document.head.prepend(base);
      })();
    </script>

    <!-- Tailwind CSS CDN for modern styling -->
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
      @import url("https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap");
      body {
        font-family: "Inter", sans-serif;
        background-color: #f3f4f6;
      }
      .nav-btn.active {
        color: #4f46e5;
        border-top: 2px solid #4f46e5;
      }
      .nav-btn:not(.active) {
        color: #6b7280;
      }
      .nav-btn:hover:not(.active) {
        color: #4f46e5;
      }
    </style>
  </head>
  <body class="flex flex-col min-h-screen">
    <!-- Hamburger Menu (Off-Canvas Sidebar) -->
    <nav
      id="hamburger-menu"
      class="fixed top-0 left-0 w-64 h-full bg-white z-[100] transform -translate-x-full transition-transform duration-300 ease-in-out shadow-lg p-6"
    >
      <div class="flex items-center justify-between mb-8">
        <h3 class="text-xl font-bold text-indigo-600">Bazaar Odisha</h3>
        <button id="close-menu-btn" class="text-gray-600 hover:text-gray-800">
          <svg
            class="w-6 h-6"
            fill="none"
            stroke="currentColor"
            viewBox="0 0 24 24"
          >
            <path
              stroke-linecap="round"
              stroke-linejoin="round"
              stroke-width="2"
              d="M6 18L18 6M6 6l12 12"
            ></path>
          </svg>
        </button>
      </div>
      <ul class="space-y-4">
        <li>
          <a
            href="profile.html"
            class="flex items-center space-x-3 text-gray-700 hover:text-indigo-600"
            ><span>Profile</span></a
          >
        </li>
        <li>
          <a
            href="settings.html"
            class="flex items-center space-x-3 text-gray-700 hover:text-indigo-600"
            ><span>Settings</span></a
          >
        </li>
        <li>
          <a
            href="wishlist.html"
            class="flex items-center space-x-3 text-gray-700 hover:text-indigo-600"
            ><span>Wishlist</span></a
          >
        </li>
        <li class="border-t my-4"></li>
        <li>
          <a
            href="about.html"
            class="flex items-center space-x-3 text-gray-700 hover:text-indigo-600"
            ><span>About Us</span></a
          >
        </li>
        <li>
          <a
            href="contact.html"
            class="flex items-center space-x-3 text-gray-700 hover:text-indigo-600"
            ><span>Contact</span></a
          >
        </li>
      </ul>
    </nav>
    <div
      id="overlay"
      class="fixed inset-0 bg-black opacity-0 pointer-events-none transition-opacity duration-300 z-[90]"
    ></div>

    <!-- Top Bar (Header) -->
    <header
      class="bg-white sticky top-0 z-50 shadow-sm p-4 flex items-center justify-between"
    >
      <div class="flex items-center">
        <a href="services.html" class="text-gray-600 hover:text-gray-800"
          ><svg
            class="w-6 h-6"
            fill="none"
            stroke="currentColor"
            viewBox="0 0 24 24"
          >
            <path
              stroke-linecap="round"
              stroke-linejoin="round"
              stroke-width="2"
              d="M15 19l-7-7 7-7"
            ></path></svg
        ></a>
        <span
          id="header-title"
          class="ml-4 text-xl font-bold text-indigo-600 hidden md:block"
          >Service Details</span
        >
      </div>
      <button id="open-menu-btn" class="text-gray-600 hover:text-gray-800">
        <svg
          class="w-6 h-6"
          fill="none"
          stroke="currentColor"
          viewBox="0 0 24 24"
        >
          <path
            stroke-linecap="round"
            stroke-linejoin="round"
            stroke-width="2"
            d="M4 6h16M4 12h16M4 18h16"
          ></path>
        </svg>
      </button>
    </header>

    <!-- Main content area -->
    <main id="service-detail-container" class="flex-grow pb-24 overflow-y-auto">
      <!-- This area will be populated by JavaScript -->
      <div class="text-center p-8">
        <p class="text-gray-500">Loading service details...</p>
      </div>
    </main>

    <!-- Bottom Action Bar -->
    <div
      id="action-bar"
      class="fixed bottom-0 left-0 right-0 bg-white shadow-lg z-50 p-4 border-t"
    >
      <!-- Action buttons will be populated by JavaScript -->
    </div>

    <!-- Load data file -->
    <script src="data.js"></script>
    <script>
      const detailContainer = document.getElementById(
        "service-detail-container"
      );
      const actionBar = document.getElementById("action-bar");
      const headerTitle = document.getElementById("header-title");
      const openMenuBtn = document.getElementById("open-menu-btn");
      const closeMenuBtn = document.getElementById("close-menu-btn");
      const hamburgerMenu = document.getElementById("hamburger-menu");
      const overlay = document.getElementById("overlay");

      // --- UNIFIED WISHLIST LOGIC ---
      function getWishlist() {
        return JSON.parse(localStorage.getItem("wishlist")) || [];
      }

      function saveWishlist(wishlist) {
        localStorage.setItem("wishlist", JSON.stringify(wishlist));
      }

      function toggleWishlist(serviceId) {
        let wishlist = getWishlist();
        const itemhome = wishlist.findhome(
          (item) => item.id === serviceId && item.type === "service"
        );

        if (itemhome > -1) {
          wishlist.splice(itemhome, 1); // Remove
        } else {
          wishlist.push({ id: serviceId, type: "service" }); // Add
        }
        saveWishlist(wishlist);

        // Re-render only the heart button for an instant update
        const service = servicesData.find((s) => s.id === serviceId);
        if (service) {
          renderServiceDetails(service); // Re-render the whole detail view to update the button
        }
      }

      function renderServiceDetails(data) {
        const wishlist = getWishlist();
        const isInWishlist = wishlist.some(
          (item) => item.id === data.id && item.type === "service"
        );

        document.title = `${data.name} - Bazaar Odisha`;
        headerTitle.textContent = data.name;

        detailContainer.innerHTML = `
                <div class="bg-white pb-6">
                    <div class="p-6 flex items-start gap-4">
                        <img src="${data.image}" alt="${
          data.name
        }" class="w-24 h-24 rounded-full border-4 border-indigo-100 object-cover flex-shrink-0">
                        <div class="flex-grow">
                            <div class="flex justify-between items-start">
                                <h2 class="text-2xl font-bold text-gray-900">${
                                  data.name
                                }</h2>
                                <button onclick="toggleWishlist(${
                                  data.id
                                })" class="flex-shrink-0 p-1 rounded-full z-10 hover:bg-red-50" title="Add to Wishlist">
                                    ${
                                      isInWishlist
                                        ? `<svg class="w-7 h-7 text-red-500" fill="currentColor" viewBox="0 0 20 20"><path fill-rule="evenodd" d="M3.172 5.172a4 4 0 015.656 0L10 6.343l1.172-1.171a4 4 0 115.656 5.656L10 17.657l-6.828-6.829a4 4 0 010-5.656z" clip-rule="evenodd"></path></svg>`
                                        : `<svg class="w-7 h-7 text-gray-400 hover:text-red-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4.318 6.318a4.5 4.5 0 000 6.364L12 20.364l7.682-7.682a4.5 4.5 0 00-6.364-6.364L12 7.636l-1.318-1.318a4.5 4.5 0 00-6.364 0z"></path></svg>`
                                    }
                                </button>
                            </div>
                            <p class="text-md text-gray-600">${
                              data.category
                            } | ${data.location}</p>
                            <div class="mt-2 flex items-center text-sm bg-yellow-100 text-yellow-800 px-2 py-0.5 rounded-full w-fit">
                                <svg class="w-4 h-4 mr-1 text-yellow-500" fill="currentColor" viewBox="0 0 20 20"><path d="M9.049 2.927c.3-.921 1.603-.921 1.902 0l1.07 3.292a1 1 0 00.95.69h3.462c.969 0 1.371 1.24.588 1.81l-2.8 2.034a1 1 0 00-.364 1.118l1.07 3.292c.3.921-.755 1.688-1.54 1.118l-2.8-2.034a1 1 0 00-1.175 0l-2.8 2.034c-.784.57-1.838-.197-1.539-1.118l1.07-3.292a1 1 0 00-.364-1.118L2.98 8.72c-.783-.57-.38-1.81.588-1.81h3.461a1 1 0 00.951-.69l1.07-3.292z"></path></svg>
                                <b>${data.rating}</b>&nbsp;(${
          data.reviews.length
        } reviews)
                            </div>
                        </div>
                    </div>
                    <div class="px-6">
                        <h3 class="font-semibold text-gray-800 mb-2">About</h3>
                        <p class="text-gray-700 leading-relaxed">${
                          data.description
                        }</p>
                    </div>
                </div>

                <div class="p-6">
                    <h3 class="text-xl font-bold text-gray-800 mb-4">Gallery</h3>
                    ${
                      data.gallery && data.gallery.length > 0
                        ? `
                    <div class="grid grid-cols-3 gap-2">
                        ${data.gallery
                          .map(
                            (url) =>
                              `<img src="${url}" class="w-full h-24 object-cover rounded-md" alt="Work sample">`
                          )
                          .join("")}
                    </div>
                    `
                        : `<p class="text-gray-500 text-sm">No gallery images available.</p>`
                    }
                </div>

                <div class="p-6">
                    <h3 class="text-xl font-bold text-gray-800 mb-4">Reviews</h3>
                    <div class="space-y-4">
                        ${
                          data.reviews && data.reviews.length > 0
                            ? data.reviews
                                .map(
                                  (review) => `
                            <div class="bg-white rounded-lg p-4 shadow-sm border">
                                <div class="flex items-center mb-1">
                                    <p class="font-semibold">${review.user}</p>
                                    <div class="ml-auto flex items-center text-yellow-400">${"★".repeat(
                                      review.rating
                                    )}${"☆".repeat(5 - review.rating)}</div>
                                </div>
                                <p class="text-gray-600 text-sm">${
                                  review.comment
                                }</p>
                            </div>
                        `
                                )
                                .join("")
                            : `<p class="text-gray-500 text-sm">No reviews yet for this service provider.</p>`
                        }
                    </div>
                </div>
            `;

        const whatsappLink = `https://wa.me/${data.phone}?text=Hello%20${data.name},%20I%20found%20you%20on%20Bazaar%20Odisha.`;
        const callLink = `tel:${data.phone}`;
        actionBar.innerHTML = `
                <div class="flex gap-4">
                    <a href="${callLink}" class="flex-1 text-center bg-gray-200 hover:bg-gray-300 text-gray-800 font-bold py-3 px-4 rounded-full transition-colors duration-300">Call Now</a>
                    <a href="${whatsappLink}" target="_blank" class="flex-1 text-center bg-green-500 hover:bg-green-600 text-white font-bold py-3 px-4 rounded-full transition-colors duration-300">Contact via WhatsApp</a>
                </div>
            `;
      }

      // --- DYNAMIC PAGE LOAD LOGIC ---
      document.addEventListener("DOMContentLoaded", () => {
        const urlParams = new URLSearchParams(window.location.search);
        const serviceId = parseInt(urlParams.get("id"));

        if (!serviceId) {
          detailContainer.innerHTML = `<div class="p-8 text-center"><h2 class="text-xl font-bold">Invalid Service ID</h2><a href="services.html" class="text-indigo-600">Go Back to Services</a></div>`;
          actionBar.style.display = "none";
          return;
        }

        const service = servicesData.find((s) => s.id === serviceId);

        if (service) {
          renderServiceDetails(service);
        } else {
          detailContainer.innerHTML = `<div class="p-8 text-center"><h2 class="text-xl font-bold">Service Not Found</h2><p class="text-gray-500">The requested service ID does not exist.</p><a href="services.html" class="mt-4 inline-block text-indigo-600">Go Back to Services</a></div>`;
          actionBar.style.display = "none";
        }
      });

      // --- HAMBURGER MENU LOGIC ---
      function toggleHamburgerMenu() {
        hamburgerMenu.classList.toggle("-translate-x-full");
        overlay.classList.toggle("opacity-0");
        overlay.classList.toggle("pointer-events-none");
        overlay.classList.toggle("opacity-50");
      }
      openMenuBtn.addEventListener("click", toggleHamburgerMenu);
      closeMenuBtn.addEventListener("click", toggleHamburgerMenu);
      overlay.addEventListener("click", toggleHamburgerMenu);
    </script>
  </body>
</html>
