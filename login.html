<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Login - Bazaar Odisha</title>

    <!-- DYNAMIC BASE TAG (Permanent Fix) -->
    <script>
      (function () {
        const repoName = "Bazaar-Odisha"; // Your repository name
        const isGitHub = window.location.hostname.includes("github.io");
        const base = document.createElement("base");
        base.href = isGitHub ? `/${repoName}/` : "/";
        document.head.prepend(base);
      })();
    </script>

    <script src="https://cdn.tailwindcss.com"></script>
  </head>
  <body class="bg-gray-100 flex items-center justify-center h-screen p-4">
    <div class="bg-white p-8 rounded-xl shadow-lg w-full max-w-sm">
      <div class="text-center mb-6">
        <img
          src="images/app_logo.png"
          alt="Bazaar Odisha Logo"
          class="h-16 w-auto mx-auto mb-2"
        />
        <h2 class="text-2xl font-bold text-gray-900">Welcome!</h2>
        <p class="text-gray-500">Sign in to continue to Bazaar Odisha.</p>
      </div>

      <!-- This container is REQUIRED for Firebase's invisible reCAPTCHA -->
      <div id="recaptcha-container"></div>

      <!-- Phone Number Input Section -->
      <div id="phone-input-section">
        <label
          for="phone-number"
          class="block text-sm font-medium text-gray-700"
          >Mobile Number</label
        >
        <input
          type="tel"
          id="phone-number"
          placeholder="+91XXXXXXXXXX"
          class="mt-1 block w-full px-4 py-2 border border-gray-300 rounded-md shadow-sm focus:outline-none focus:ring-indigo-500 focus:border-indigo-500"
        />
        <button
          id="send-code-btn"
          class="mt-4 w-full bg-indigo-600 text-white font-semibold py-2 px-4 rounded-full hover:bg-indigo-700"
        >
          Send Verification Code
        </button>
      </div>

      <!-- OTP Input Section (Initially Hidden) -->
      <div id="otp-input-section" class="hidden">
        <p class="text-sm text-center text-gray-600 mb-4">
          Enter the 6-digit code sent to your number.
        </p>
        <label
          for="verification-code"
          class="block text-sm font-medium text-gray-700"
          >Verification Code</label
        >
        <input
          type="text"
          id="verification-code"
          placeholder="XXXXXX"
          class="mt-1 block w-full px-4 py-2 border border-gray-300 rounded-md shadow-sm focus:outline-none focus:ring-indigo-500 focus:border-indigo-500"
        />
        <button
          id="verify-code-btn"
          class="mt-4 w-full bg-green-600 text-white font-semibold py-2 px-4 rounded-full hover:bg-green-700"
        >
          Verify & Sign In
        </button>
      </div>

      <p id="error-message" class="text-red-500 text-sm mt-4 text-center"></p>
    </div>

    <!-- Firebase v8 Compatibility SDKs -->
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>

    <script>
      // Your web app's Firebase configuration
      const firebaseConfig = {
        apiKey: "AIzaSyCtKssk0Ffo0ylSQF4hnhkffQmX-C-vQOE",
        authDomain: "bazzar-odisha.firebaseapp.com",
        projectId: "bazzar-odisha",
        storageBucket: "bazzar-odisha.appspot.com",
        messagingSenderId: "441459698881",
        appId: "1:441459698881:web:09f7cfe94ffd5b9f40b840",
      };
      firebase.initializeApp(firebaseConfig);

      const phoneInputSection = document.getElementById("phone-input-section");
      const otpInputSection = document.getElementById("otp-input-section");
      const phoneNumberField = document.getElementById("phone-number");
      const verificationCodeField =
        document.getElementById("verification-code");
      const sendCodeBtn = document.getElementById("send-code-btn");
      const verifyCodeBtn = document.getElementById("verify-code-btn");
      const errorMessage = document.getElementById("error-message");

      // Initialize the invisible reCAPTCHA verifier
      window.recaptchaVerifier = new firebase.auth.RecaptchaVerifier(
        "recaptcha-container",
        {
          size: "invisible",
        }
      );

      // Function to send the verification code
      function sendVerificationCode() {
        const phoneNumber = phoneNumberField.value;
        if (!phoneNumber.startsWith("+91") || phoneNumber.length < 13) {
          errorMessage.textContent =
            "Please enter a valid number with country code (+91).";
          return;
        }
        errorMessage.textContent = "";

        firebase
          .auth()
          .signInWithPhoneNumber(phoneNumber, window.recaptchaVerifier)
          .then((confirmationResult) => {
            window.confirmationResult = confirmationResult;
            alert("Verification code has been sent to your phone.");
            phoneInputSection.classList.add("hidden");
            otpInputSection.classList.remove("hidden");
          })
          .catch((error) => {
            console.error("Error during SMS sending:", error);
            errorMessage.textContent =
              "Failed to send code. Please check the number or try again.";
            // This is important to allow the user to retry
            window.recaptchaVerifier.render().then((widgetId) => {
              grecaptcha.reset(widgetId);
            });
          });
      }

      // Function to verify the OTP and sign the user in
      function verifyCode() {
        const code = verificationCodeField.value;
        if (code.length !== 6) {
          errorMessage.textContent = "Please enter the 6-digit code.";
          return;
        }
        errorMessage.textContent = "";

        window.confirmationResult
          .confirm(code)
          .then((result) => {
            alert("Sign-in successful!");
            window.location.replace("home.html");
          })
          .catch((error) => {
            console.error("Error during code verification:", error);
            errorMessage.textContent = "Invalid code. Please try again.";
          });
      }

      sendCodeBtn.addEventListener("click", sendVerificationCode);
      verifyCodeBtn.addEventListener("click", verifyCode);
    </script>
  </body>
</html>
