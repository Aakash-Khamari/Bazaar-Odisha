<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Bazaar Odisha - Product Details</title>

    <!-- DYNAMIC BASE TAG (Permanent Fix) -->
    <script>
      (function () {
        const repoName = "Bazaar-Odisha"; // Your repository name
        const isGitHub = window.location.hostname.includes("github.io");
        const base = document.createElement("base");
        base.href = isGitHub ? `/${repoName}/` : "/";
        document.head.prepend(base);
      })();
    </script>

    <!-- Tailwind CSS CDN for modern styling -->
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
      @import url("https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap");
      body {
        font-family: "Inter", sans-serif;
        background-color: #f3f4f6;
      }
      .nav-btn.active {
        color: #4f46e5;
        border-top: 2px solid #4f46e5;
      }
      .nav-btn:not(.active) {
        color: #6b7280;
      }
      .nav-btn:hover:not(.active) {
        color: #4f46e5;
      }
      .thumbnail.active {
        border-color: #4f46e5;
      }
    </style>
  </head>
  <body class="flex flex-col min-h-screen">
    <!-- Hamburger Menu (Off-Canvas Sidebar) -->
    <nav
      id="hamburger-menu"
      class="fixed top-0 left-0 w-64 h-full bg-white z-[100] transform -translate-x-full transition-transform duration-300 ease-in-out shadow-lg p-6"
    >
      <div class="flex items-center justify-between mb-8">
        <h3 class="text-xl font-bold text-indigo-600">Bazaar Odisha</h3>
        <button id="close-menu-btn" class="text-gray-600 hover:text-gray-800">
          <svg
            class="w-6 h-6"
            fill="none"
            stroke="currentColor"
            viewBox="0 0 24 24"
          >
            <path
              stroke-linecap="round"
              stroke-linejoin="round"
              stroke-width="2"
              d="M6 18L18 6M6 6l12 12"
            ></path>
          </svg>
        </button>
      </div>
      <ul class="space-y-4">
        <li>
          <a
            href="profile.html"
            class="flex items-center space-x-3 text-gray-700 hover:text-indigo-600"
            ><span>Profile</span></a
          >
        </li>
        <li>
          <a
            href="settings.html"
            class="flex items-center space-x-3 text-gray-700 hover:text-indigo-600"
            ><span>Settings</span></a
          >
        </li>
        <li>
          <a
            href="wishlist.html"
            class="flex items-center space-x-3 text-gray-700 hover:text-indigo-600"
            ><span>Wishlist</span></a
          >
        </li>
        <li class="border-t my-4"></li>
        <li>
          <a
            href="about.html"
            class="flex items-center space-x-3 text-gray-700 hover:text-indigo-600"
            ><span>About Us</span></a
          >
        </li>
        <li>
          <a
            href="contact.html"
            class="flex items-center space-x-3 text-gray-700 hover:text-indigo-600"
            ><span>Contact</span></a
          >
        </li>
      </ul>
    </nav>
    <div
      id="overlay"
      class="fixed inset-0 bg-black opacity-0 pointer-events-none transition-opacity duration-300 z-[90]"
    ></div>

    <!-- Top Bar (Header) -->
 <header
  class="bg-white sticky top-0 z-50 shadow-sm px-3 pb-3 flex items-center justify-between"
  style="padding-top: calc(0.75rem + var(--safe-area-inset-top, 0px));"
>

      <div class="flex items-center">
        <a href="bazaar.html" class="text-gray-600 hover:text-gray-800"
          ><svg
            class="w-6 h-6"
            fill="none"
            stroke="currentColor"
            viewBox="0 0 24 24"
          >
            <path
              stroke-linecap="round"
              stroke-linejoin="round"
              stroke-width="2"
              d="M15 19l-7-7 7-7"
            ></path></svg
        ></a>
        <span
          id="header-title"
          class="ml-4 text-xl font-bold text-indigo-600 hidden md:block"
          >Product Details</span
        >
      </div>
      <button id="open-menu-btn" class="text-gray-600 hover:text-gray-800">
        <svg
          class="w-6 h-6"
          fill="none"
          stroke="currentColor"
          viewBox="0 0 24 24"
        >
          <path
            stroke-linecap="round"
            stroke-linejoin="round"
            stroke-width="2"
            d="M4 6h16M4 12h16M4 18h16"
          ></path>
        </svg>
      </button>
    </header>

    <!-- Main content area -->
    <main id="product-detail-container" class="flex-grow pb-24 overflow-y-auto">
      <!-- This area will be populated by JavaScript -->
      <div class="text-center p-8">
        <p class="text-gray-500">Loading product details...</p>
      </div>
    </main>

    <!-- Bottom Action Bar -->
    <div
      id="action-bar"
      class="fixed bottom-0 left-0 right-0 bg-white shadow-lg z-50 p-4 border-t"
    >
      <!-- Action buttons will be populated by JavaScript -->
    </div>

    <!-- Load the data files BEFORE the main script -->
    <script src="bazaar_data.js"></script>
    <script>
      const detailContainer = document.getElementById(
        "product-detail-container"
      );
      const actionBar = document.getElementById("action-bar");
      const headerTitle = document.getElementById("header-title");
      const openMenuBtn = document.getElementById("open-menu-btn");
      const closeMenuBtn = document.getElementById("close-menu-btn");
      const hamburgerMenu = document.getElementById("hamburger-menu");
      const overlay = document.getElementById("overlay");

      // --- UNIFIED WISHLIST LOGIC ---
      function getWishlist() {
        return JSON.parse(localStorage.getItem("wishlist")) || [];
      }

      function saveWishlist(wishlist) {
        localStorage.setItem("wishlist", JSON.stringify(wishlist));
      }

      function toggleWishlist(productId) {
        let wishlist = getWishlist();
        const itemhome = wishlist.findhome(
          (item) => item.id === productId && item.type === "product"
        );

        if (itemhome > -1) {
          wishlist.splice(itemhome, 1); // Remove
        } else {
          wishlist.push({ id: productId, type: "product" }); // Add
        }
        saveWishlist(wishlist);

        // Re-render the product details to update the button's state
        const product = bazaarProducts.find((p) => p.id === productId);
        if (product) {
          const vendor = shgVendors.find((v) => v.id === product.vendorId);
          if (vendor) {
            renderProductDetails(product, vendor);
          }
        }
      }

      function renderProductDetails(product, vendor) {
        const wishlist = getWishlist();
        const isInWishlist = wishlist.some(
          (item) => item.id === product.id && item.type === "product"
        );

        document.title = `${product.name} - Bazaar Odisha`;
        headerTitle.textContent = product.name;

        // Main Content
        detailContainer.innerHTML = `
                <div class="bg-white">
                    <div class="relative">
                        <img id="main-image" src="${product.images[0]}" alt="${
          product.name
        }" class="w-full h-64 object-cover">
                        <button onclick="toggleWishlist(${
                          product.id
                        })" class="absolute top-2 right-2 bg-white/70 p-2 rounded-full z-10" title="Add to Wishlist">
                            ${
                              isInWishlist
                                ? `<svg class="w-6 h-6 text-red-500" fill="currentColor" viewBox="0 0 20 20"><path fill-rule="evenodd" d="M3.172 5.172a4 4 0 015.656 0L10 6.343l1.172-1.171a4 4 0 115.656 5.656L10 17.657l-6.828-6.829a4 4 0 010-5.656z" clip-rule="evenodd"></path></svg>`
                                : `<svg class="w-6 h-6 text-gray-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4.318 6.318a4.5 4.5 0 000 6.364L12 20.364l7.682-7.682a4.5 4.5 0 00-6.364-6.364L12 7.636l-1.318-1.318a4.5 4.5 0 00-6.364 0z"></path></svg>`
                            }
                        </button>
                    </div>
                    <div class="flex space-x-2 p-2 overflow-x-auto">
                        ${product.images
                          .map(
                            (img, home) => `
                            <img src="${img}" class="thumbnail w-16 h-16 rounded-md object-cover cursor-pointer border-2 ${
                              home === 0 ? "active" : "border-transparent"
                            }" onclick="changeImage('${img}', this)">
                        `
                          )
                          .join("")}
                    </div>
                </div>
                
                <div class="p-4 md:p-6">
                    <p class="text-sm font-medium text-indigo-600">${
                      product.category
                    }</p>
                    <h1 class="text-2xl font-bold text-gray-900 mt-1">${
                      product.name
                    }</h1>
                    <div class="mt-2 flex items-center justify-between">
                         <p class="text-3xl font-bold text-gray-800">₹${
                           product.price
                         } <span class="text-base font-normal text-gray-500">/ ${
          product.unit
        }</span></p>
                         <div class="flex items-center text-sm text-yellow-500">
                             <svg class="w-5 h-5" fill="currentColor" viewBox="0 0 20 20"><path d="M9.049 2.927c.3-.921 1.603-.921 1.902 0l1.07 3.292a1 1 0 00.95.69h3.462c.969 0 1.371 1.24.588 1.81l-2.8 2.034a1 1 0 00-.364 1.118l1.07 3.292c.3.921-.755 1.688-1.54 1.118l-2.8-2.034a1 1 0 00-1.175 0l-2.8 2.034c-.784.57-1.838-.197-1.539-1.118l1.07-3.292a1 1 0 00-.364-1.118L2.98 8.72c-.783-.57-.38-1.81.588-1.81h3.461a1 1 0 00.951-.69l1.07-3.292z"></path></svg>
                             <span class="ml-1 font-bold text-gray-700">${
                               product.rating
                             }</span>
                         </div>
                    </div>
                    
                    <div class="mt-4 bg-gray-50 rounded-lg p-3">
                        <p class="text-sm font-medium text-gray-500">Sold by</p>
                        <p class="font-semibold text-gray-800">${
                          vendor.name
                        }, ${vendor.location}</p>
                    </div>

                    <div class="mt-6">
                        <h3 class="font-semibold text-gray-800 mb-2">Description</h3>
                        <p class="text-gray-700 leading-relaxed">${
                          product.description
                        }</p>
                    </div>
                </div>
            `;

        // Action Bar
        const whatsappLink = `https://wa.me/${vendor.phone}?text=Hello%20${vendor.name},%20I%20am%20interested%20in%20ordering%20'${product.name}'%20from%20Bazaar%20Odisha.`;
        const callLink = `tel:${vendor.phone}`;

        actionBar.innerHTML = `
                <div class="flex gap-4">
                    <a href="${callLink}" class="flex-1 text-center bg-gray-200 hover:bg-gray-300 text-gray-800 font-bold py-3 px-4 rounded-full transition-colors duration-300">Call Now</a>
                    <a href="${whatsappLink}" target="_blank" class="flex-1 text-center bg-green-500 hover:bg-green-600 text-white font-bold py-3 px-4 rounded-full transition-colors duration-300">Order on WhatsApp</a>
                </div>
            `;
      }

      // --- IMAGE GALLERY LOGIC ---
      function changeImage(newSrc, clickedThumbnail) {
        document.getElementById("main-image").src = newSrc;
        // Update active state on thumbnails
        document
          .querySelectorAll(".thumbnail")
          .forEach((thumb) => thumb.classList.remove("active"));
        clickedThumbnail.classList.add("active");
      }

      // --- DYNAMIC PAGE LOAD LOGIC ---
      document.addEventListener("DOMContentLoaded", () => {
        const urlParams = new URLSearchParams(window.location.search);
        const productId = parseInt(urlParams.get("id"));

        if (!productId) {
          detailContainer.innerHTML = `<div class="p-8 text-center"><h2 class="text-xl font-bold">Invalid Product ID</h2><a href="bazaar.html" class="text-indigo-600">Go Back to Bazaar</a></div>`;
          return;
        }

        const product = bazaarProducts.find((p) => p.id === productId);

        if (product) {
          const vendor = shgVendors.find((v) => v.id === product.vendorId);
          if (vendor) {
            renderProductDetails(product, vendor);
          } else {
            detailContainer.innerHTML = `<div class="p-8 text-center"><h2 class="text-xl font-bold">Vendor Not Found</h2><p class="text-gray-500">The seller for this product could not be found.</p><a href="bazaar.html" class="mt-4 inline-block text-indigo-600">Go Back to Bazaar</a></div>`;
            actionBar.style.display = "none";
          }
        } else {
          detailContainer.innerHTML = `<div class="p-8 text-center"><h2 class="text-xl font-bold">Product Not Found</h2><p class="text-gray-500">The requested product ID does not exist.</p><a href="bazaar.html" class="mt-4 inline-block text-indigo-600">Go Back to Bazaar</a></div>`;
          actionBar.style.display = "none";
        }
      });

      // Hamburger Menu Logic
      function toggleHamburgerMenu() {
        hamburgerMenu.classList.toggle("-translate-x-full");
        overlay.classList.toggle("opacity-0");
        overlay.classList.toggle("pointer-events-none");
        overlay.classList.toggle("opacity-50");
      }
      openMenuBtn.addEventListener("click", toggleHamburgerMenu);
      closeMenuBtn.addEventListener("click", toggleHamburgerMenu);
      overlay.addEventListener("click", toggleHamburgerMenu);
    </script>
  </body>
</html>
