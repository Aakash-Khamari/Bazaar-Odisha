<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Bazaar Odisha - Community Forum</title>

    <!-- DYNAMIC BASE TAG (Permanent Fix) -->
    <script>
      (function () {
        const repoName = "Bazaar-Odisha"; // Your repository name
        const isGitHub = window.location.hostname.includes("github.io");
        const base = document.createElement("base");
        base.href = isGitHub ? `/${repoName}/` : "/";
        document.head.prepend(base);
      })();
    </script>

    <!-- Tailwind CSS CDN for modern styling -->
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
      @import url("https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap");
      body {
        font-family: "Inter", sans-serif;
        background-color: #f3f4f6;
      }
      .nav-btn.active {
        color: #4f46e5;
        border-top: 2px solid #4f46e5;
      }
      .nav-btn:not(.active) {
        color: #6b7280;
      }
      .nav-btn:hover:not(.active) {
        color: #4f46e5;
      }
    </style>
  </head>
  <body class="flex flex-col min-h-screen">
    <!-- Hamburger Menu (Off-Canvas Sidebar) -->
    <nav
      id="hamburger-menu"
      class="fixed top-0 left-0 w-64 h-full bg-white z-[100] transform -translate-x-full transition-transform duration-300 ease-in-out shadow-lg p-6"
    >
      <div class="flex items-center justify-between mb-8">
        <a href="home.html" class="flex items-center gap-2">
          <img
            src="images/app_logo.png"
            alt="Bazaar Odisha Logo"
            class="h-8 w-auto"
          />
          <span class="text-xl font-bold text-indigo-600">Bazaar Odisha</span>
        </a>
        <button id="close-menu-btn" class="text-gray-600 hover:text-gray-800">
          <svg
            class="w-6 h-6"
            fill="none"
            stroke="currentColor"
            viewBox="0 0 24 24"
          >
            <path
              stroke-linecap="round"
              stroke-linejoin="round"
              stroke-width="2"
              d="M6 18L18 6M6 6l12 12"
            ></path>
          </svg>
        </button>
      </div>
      <ul class="space-y-4">
        <li>
          <a
            href="profile.html"
            class="flex items-center space-x-3 text-gray-700 hover:text-indigo-600"
            ><span>Profile</span></a
          >
        </li>
        <li>
          <a
            href="settings.html"
            class="flex items-center space-x-3 text-gray-700 hover:text-indigo-600"
            ><span>Settings</span></a
          >
        </li>
        <li>
          <a
            href="wishlist.html"
            class="flex items-center space-x-3 text-gray-700 hover:text-indigo-600"
            ><span>Wishlist</span></a
          >
        </li>
        <li class="border-t my-4"></li>
        <li>
          <a
            href="about.html"
            class="flex items-center space-x-3 text-gray-700 hover:text-indigo-600"
            ><span>About Us</span></a
          >
        </li>
        <li>
          <a
            href="contact.html"
            class="flex items-center space-x-3 text-gray-700 hover:text-indigo-600"
            ><span>Contact</span></a
          >
        </li>
      </ul>
    </nav>
    <div
      id="overlay"
      class="fixed inset-0 bg-black opacity-0 pointer-events-none transition-opacity duration-300 z-[90]"
    ></div>

    <!-- **UPDATED** Top Bar (Header) -->
    <header
      class="bg-white sticky top-0 z-50 shadow-sm p-3 flex items-center justify-between"
    >
      <!-- Left side: Logo and App Name (links to home) -->
      <a href="home.html" class="flex items-center gap-2">
        <img
          src="images/app_logo.png"
          alt="Bazaar Odisha Logo"
          class="h-8 w-auto"
        />
        <span class="text-xl font-bold text-indigo-600">Bazaar Odisha</span>
      </a>

      <!-- Right side: Hamburger Menu Button -->
      <button id="open-menu-btn" class="text-gray-600 hover:text-gray-800">
        <svg
          class="w-6 h-6"
          fill="none"
          stroke="currentColor"
          viewBox="0 0 24 24"
        >
          <path
            stroke-linecap="round"
            stroke-linejoin="round"
            stroke-width="2"
            d="M4 6h16M4 12h16M4 18h16"
          ></path>
        </svg>
      </button>
    </header>

    <!-- Main content area -->
    <main class="flex-grow p-4 md:p-6 mb-20 overflow-y-auto">
      <h2 class="text-2xl font-bold text-gray-900 mb-2">Community Forum</h2>
      <p class="text-gray-600 mb-6">
        Ask questions, get help, and share recommendations with your neighbors.
      </p>

      <!-- New Post Form -->
      <div class="bg-white rounded-xl shadow p-4 mb-6">
        <h3 class="font-semibold text-gray-800 mb-2">
          Post a New Question or Recommendation
        </h3>
        <form id="new-post-form">
          <textarea
            id="new-post-content"
            class="w-full p-2 border border-gray-300 rounded-md"
            rows="3"
            placeholder="What's on your mind?"
          ></textarea>
          <button
            type="submit"
            class="mt-2 w-full bg-indigo-600 text-white font-semibold py-2 px-4 rounded-full hover:bg-indigo-700"
          >
            Post
          </button>
        </form>
      </div>

      <!-- Posts Container -->
      <div id="posts-container" class="space-y-4">
        <!-- Posts will be dynamically inserted here -->
      </div>
    </main>

    <!-- **UPDATED** Bottom Navigation Bar -->
    <nav class="fixed bottom-0 left-0 right-0 bg-white shadow-lg z-50">
      <div class="grid grid-cols-5 h-16">
        <a
          href="home.html"
          class="nav-btn flex flex-col items-center justify-center pt-2 pb-1"
        >
          <svg class="h-6 w-6" fill="currentColor" viewBox="0 0 20 20">
            <path
              d="M10.707 2.293a1 1 0 00-1.414 0l-7 7a1 1 0 001.414 1.414L4 10.414V17a1 1 0 001 1h2a1 1 0 001-1v-2a1 1 0 011-1h2a1 1 0 011 1v2a1 1 0 001 1h2a1 1 0 001-1v-6.586l.293.293a1 1 0 001.414-1.414l-7-7z"
            ></path>
          </svg>
          <span class="text-xs mt-1">Home</span>
        </a>
        <a
          href="services.html"
          class="nav-btn flex flex-col items-center justify-center pt-2 pb-1"
        >
          <svg
            class="h-6 w-6"
            fill="none"
            stroke="currentColor"
            viewBox="0 0 24 24"
          >
            <path
              stroke-linecap="round"
              stroke-linejoin="round"
              stroke-width="2"
              d="M21 13.255A23.931 23.931 0 0112 15c-3.183 0-6.22-1.206-8.255-3.255m16.51 0a23.931 23.931 0 01-16.51 0m16.51 0v-.255a2 2 0 00-2-2h-13a2 2 0 00-2 2v.255m0 0a2 2 0 01-2 2h-1a2 2 0 01-2-2v-.255a23.931 23.931 0 01-16.51 0m0 0v-.255a2 2 0 012-2h13a2 2 0 012 2v.255"
            ></path>
          </svg>
          <span class="text-xs mt-1">Services</span>
        </a>
        <a
          href="bazaar.html"
          class="nav-btn flex flex-col items-center justify-center pt-2 pb-1"
        >
          <svg
            class="h-6 w-6"
            fill="none"
            stroke="currentColor"
            viewBox="0 0 24 24"
          >
            <path
              stroke-linecap="round"
              stroke-linejoin="round"
              stroke-width="2"
              d="M3 3h2l.4 2M7 13h10l4-8H5.4M7 13L5.4 5M7 13l-2.293 2.293c-.63.63-.182 1.706.707 1.706H17m0 0a2 2 0 100 4 2 2 0 000-4zm-8 2a2 2 0 11-4 0 2 2 0 014 0z"
            ></path>
          </svg>
          <span class="text-xs mt-1">Bazaar Cart</span>
        </a>
        <a
          href="shg.html"
          class="nav-btn flex flex-col items-center justify-center pt-2 pb-1"
        >
          <svg
            class="h-6 w-6"
            fill="none"
            stroke="currentColor"
            viewBox="0 0 24 24"
          >
            <path
              stroke-linecap="round"
              stroke-linejoin="round"
              stroke-width="2"
              d="M17 20v-2a2 2 0 00-2-2H9a2 2 0 00-2 2v2M7 14h10M7 10h10M4 7h16M4 4h16a2 2 0 012 2v12a2 2 0 01-2 2H4a2 2 0 01-2-2V6a2 2 0 012-2z"
            ></path>
          </svg>
          <span class="text-xs mt-1">SHG</span>
        </a>
        <a
          href="community.html"
          class="nav-btn flex flex-col items-center justify-center pt-2 pb-1 active"
        >
          <svg
            class="h-6 w-6"
            fill="none"
            stroke="currentColor"
            viewBox="0 0 24 24"
          >
            <path
              stroke-linecap="round"
              stroke-linejoin="round"
              stroke-width="2"
              d="M8 10h.01M12 10h.01M16 10h.01M9 16H5a2 2 0 01-2-2V6a2 2 0 012-2h14a2 2 0 012 2v8a2 2 0 01-2 2h-5l-5 5v-5z"
            ></path>
          </svg>
          <span class="text-xs mt-1">Community</span>
        </a>
      </div>
    </nav>

    <!-- Load the data file BEFORE the main script -->
    <script src="community_data.js"></script>
    <script>
      const postsContainer = document.getElementById("posts-container");
      const newPostForm = document.getElementById("new-post-form");
      const newPostContent = document.getElementById("new-post-content");
      const openMenuBtn = document.getElementById("open-menu-btn");
      const closeMenuBtn = document.getElementById("close-menu-btn");
      const hamburgerMenu = document.getElementById("hamburger-menu");
      const overlay = document.getElementById("overlay");

      function renderPosts() {
        postsContainer.innerHTML = "";
        // Using sort to always show newest posts on top
        communityPosts
          .sort((a, b) => b.id - a.id)
          .forEach((post) => {
            const postElement = document.createElement("div");
            postElement.className = "bg-white rounded-xl shadow-md";

            postElement.innerHTML = `
                    <div class="p-4 cursor-pointer" onclick="toggleReplies(${
                      post.id
                    })">
                        <div class="flex items-start gap-3">
                            <img src="${post.userImage}" alt="${
              post.userName
            }" class="w-10 h-10 rounded-full flex-shrink-0">
                            <div class="flex-grow">
                                <p class="font-semibold text-gray-900">${
                                  post.userName
                                }</p>
                                <p class="text-xs text-gray-500">${
                                  post.timestamp
                                } · ${post.location}</p>
                            </div>
                        </div>
                        <p class="mt-3 text-gray-800">${post.postContent}</p>
                        <p class="mt-3 text-xs font-semibold text-indigo-600">${
                          post.replies.length
                        } ${
              post.replies.length === 1 ? "Reply" : "Replies"
            } · Click to view</p>
                    </div>
                    
                    <!-- Replies Section (hidden by default) -->
                    <div id="replies-${
                      post.id
                    }" class="hidden border-t border-gray-200 p-4">
                        ${post.replies
                          .map(
                            (reply) => `
                            <div class="flex items-start gap-3 mt-4">
                                <img src="${reply.userImage}" alt="${reply.userName}" class="w-8 h-8 rounded-full flex-shrink-0">
                                <div class="flex-grow bg-gray-100 p-3 rounded-lg">
                                    <p class="font-semibold text-sm text-gray-800">${reply.userName}</p>
                                    <p class="text-xs text-gray-500">${reply.timestamp}</p>
                                    <p class="mt-1 text-sm text-gray-700">${reply.replyContent}</p>
                                </div>
                            </div>
                        `
                          )
                          .join("")}
                        
                        <!-- Add Reply Form -->
                        <form class="mt-4" onsubmit="handleNewReply(event, ${
                          post.id
                        })">
                            <textarea class="w-full p-2 text-sm border border-gray-300 rounded-md" rows="2" placeholder="Write a reply..."></textarea>
                            <button type="submit" class="mt-2 w-full bg-gray-600 text-white text-sm font-semibold py-1.5 px-4 rounded-full hover:bg-gray-700">Add Reply</button>
                        </form>
                    </div>
                `;
            postsContainer.appendChild(postElement);
          });
      }

      function toggleReplies(postId) {
        const repliesContainer = document.getElementById(`replies-${postId}`);
        repliesContainer.classList.toggle("hidden");
      }

      function handleNewPost(event) {
        event.preventDefault();
        const content = newPostContent.value.trim();
        if (!content) return;

        const newPost = {
          id: Date.now(), // Use timestamp for a unique ID
          userName: "Current User", // Placeholder for logged-in user
          userImage: "https://placehold.co/48x48/6366f1/ffffff?text=ME",
          timestamp: "Just now",
          location: "Bhubaneswar",
          category: "General Query",
          postContent: content,
          replies: [],
        };

        communityPosts.unshift(newPost); // Add to the beginning of the array
        newPostContent.value = "";
        renderPosts();
      }

      function handleNewReply(event, postId) {
        event.preventDefault();
        const replyContent = event.target
          .querySelector("textarea")
          .value.trim();
        if (!replyContent) return;

        const post = communityPosts.find((p) => p.id === postId);
        if (!post) return;

        const newReply = {
          id: Date.now(),
          userName: "Current User",
          userImage: "https://placehold.co/48x48/6366f1/ffffff?text=ME",
          timestamp: "Just now",
          replyContent: replyContent,
        };

        post.replies.push(newReply);
        event.target.querySelector("textarea").value = "";
        renderPosts();
        // Re-open the replies section for this post
        document.getElementById(`replies-${postId}`).classList.remove("hidden");
      }

      // EVENT LISTENERS
      newPostForm.addEventListener("submit", handleNewPost);

      function toggleHamburgerMenu() {
        hamburgerMenu.classList.toggle("-translate-x-full");
        overlay.classList.toggle("opacity-0");
        overlay.classList.toggle("pointer-events-none");
        overlay.classList.toggle("opacity-50");
      }
      openMenuBtn.addEventListener("click", toggleHamburgerMenu);
      closeMenuBtn.addEventListener("click", toggleHamburgerMenu);
      overlay.addEventListener("click", toggleHamburgerMenu);

      // INITIAL PAGE LOAD
      document.addEventListener("DOMContentLoaded", () => {
        renderPosts();
      });
    </script>
  </body>
</html>
