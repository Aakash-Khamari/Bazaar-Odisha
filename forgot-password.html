<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Forgot Password - Bazaar Odisha</title>
    <!-- DYNAMIC BASE TAG -->
    <script>
      (function () {
        const repoName = "Bazaar-Odisha";
        const isGitHub = window.location.hostname.includes("github.io");
        const base = document.createElement("base");
        base.href = isGitHub ? `/${repoName}/` : "/";
        document.head.prepend(base);
      })();
    </script>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 flex items-center justify-center h-screen p-4">
    <div class="bg-white p-8 rounded-xl shadow-lg w-full max-w-sm">
      <div class="text-center mb-6">
        <h2 class="text-2xl font-bold text-gray-900">Reset Password</h2>
        <p class="text-gray-500">Enter your email to receive a password reset link.</p>
      </div>

      <!-- Forgot Password Form -->
      <div>
        <div class="mb-4">
          <label for="email" class="block text-sm font-medium text-gray-700">Email Address</label>
          <input type="email" id="email" placeholder="you@example.com" class="mt-1 block w-full px-4 py-2 border border-gray-300 rounded-md shadow-sm focus:outline-none focus:ring-indigo-500 focus:border-indigo-500"/>
        </div>
        <button id="reset-btn" class="mt-2 w-full bg-indigo-600 text-white font-semibold py-2 px-4 rounded-full hover:bg-indigo-700">Send Reset Link</button>
      </div>

      <p class="text-center text-sm text-gray-600 mt-8">
        Remember your password? <a href="signin.html" class="font-medium text-indigo-600 hover:underline">Sign In</a>
      </p>

      <p id="message" class="text-sm mt-4 text-center"></p>
    </div>

    <!-- Firebase SDKs -->
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>

    <script>
      const firebaseConfig = { apiKey: "AIzaSyCtKssk0Ffo0ylSQF4hnhkffQmX-C-vQOE", authDomain: "bazzar-odisha.firebaseapp.com", projectId: "bazzar-odisha", storageBucket: "bazzar-odisha.appspot.com", messagingSenderId: "441459698881", appId: "1:441459698881:web:09f7cfe94ffd5b9f40b840" };
      firebase.initializeApp(firebaseConfig);
      const auth = firebase.auth();

      const emailField = document.getElementById("email");
      const resetBtn = document.getElementById("reset-btn");
      const message = document.getElementById("message");

      function sendResetEmail() {
        const email = emailField.value;
        message.textContent = "";

        if (!email) {
            message.textContent = "Please enter an email address.";
            message.classList.remove('text-green-600');
            message.classList.add('text-red-500');
            return;
        }

        auth.sendPasswordResetEmail(email)
            .then(() => {
                message.textContent = "Success! If this email is registered, a reset link has been sent.";
                message.classList.remove('text-red-500');
                message.classList.add('text-green-600');
            })
            .catch((error) => {
                console.error("Password reset error:", error);
                // Show a generic success message even on error to prevent email enumeration
                message.textContent = "If this email is registered, a reset link has been sent.";
                message.classList.remove('text-red-500');
                message.classList.add('text-green-600');
            });
      }

      resetBtn.addEventListener("click", sendResetEmail);
    </script>
</body>
</html>
