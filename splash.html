<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!-- This meta tag handles the redirect to the homepage after 3 seconds -->
    <meta http-equiv="refresh" content="3;url=index.html">
    <title>Welcome to Bazaar Odisha</title>
    <!-- ADD THIS LINE TO EVERY HTML FILE -->
    <base href="/Bazaar-Odisha/">
    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* Import the Inter font */
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');
        body {
            font-family: 'Inter', sans-serif;
        }
    </style>
</head>
<body class="bg-indigo-600 flex items-center justify-center min-h-screen">

    <!-- Splash Screen Content -->
    <div class="text-center text-white animate-pulse">
        
        <!-- App Logo (Simple SVG representation) -->
        <svg class="mx-auto w-24 h-24 mb-4" viewBox="0 0 24 24" fill="currentColor" xmlns="http://www.w3.org/2000/svg">
            <path d="M3,3H5.4L8.3,13.1C8.5,13.9,9.2,14.5,10,14.5H18.2C19,14.5,19.7,13.9,19.9,13.1L22.8,5.4H7.2" stroke="#FFF" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
            <circle cx="9" cy="20" r="2" stroke="#FFF" stroke-width="1.5"/>
            <circle cx="18" cy="20" r="2" stroke="#FFF" stroke-width="1.5"/>
        </svg>

        <!-- App Name -->
        <h1 class="text-4xl md:text-5xl font-bold tracking-wider">
            Bazaar Odisha
        </h1>
        
        <!-- Tagline -->
        <p class="text-lg md:text-xl mt-2 text-indigo-200">
            Connecting Local Economies
        </p>

    </div>

</body>
</html>
