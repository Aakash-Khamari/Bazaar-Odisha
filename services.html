    <!-- DYNAMIC BASE TAG (Permanent Fix) -->
    <script>
      (function () {
        const repoName = "Bazaar-Odisha"; // Your repository name
        const isGitHub = window.location.hostname.includes("github.io");
        const base = document.createElement("base");
        base.href = isGitHub ? `/${repoName}/` : "/";
        document.head.prepend(base);
      })();
    </script>

      }

    <div

    <!-- **UPDATED** Top Bar (Header) -->

    <!-- Main content area -->
    <main class="flex-grow p-4 md:p-6 mb-20 overflow-y-auto">
      <section class="mb-6">
        <h2 class="text-2xl font-bold text-gray-900 mb-2">Local Services</h2>

        <div class="bg-white rounded-xl shadow p-4 mb-6 sticky top-[72px] z-40">
          <div class="mb-4">
            <input

            />
          </div>
          <div class="grid grid-cols-1 md:grid-cols-3 gap-4">
            <div>
              <label
                for="category-filter"
                class="text-sm font-medium text-gray-700"
                >Category</label
              >
              <select
                id="category-filter"
                class="mt-1 block w-full pl-3 pr-10 py-2 text-base border-gray-300 focus:outline-none focus:ring-indigo-500 focus:border-indigo-500 sm:text-sm rounded-md"
              ></select>
            </div>
            <div>
              <label
                for="location-filter"
                class="text-sm font-medium text-gray-700"
                >Location</label

              <select
                id="location-filter"
                class="mt-1 block w-full pl-3 pr-10 py-2 text-base border-gray-300 focus:outline-none focus:ring-indigo-500 focus:border-indigo-500 sm:text-sm rounded-md"
              ></select>
            </div>
            <div class="flex items-end">
              <button
                id="clear-filters-btn"
                class="w-full bg-gray-200 hover:bg-gray-300 text-gray-800 font-medium py-2 px-4 rounded-md text-sm"
              >
                Clear Filters
              </button>
            </div>
          </div>
        </div>

        <!-- Service Listings Container -->
        <div id="service-listings-container" class="space-y-4"></div>
      </section>
    </main>

    <!-- **UPDATED** Bottom Navigation Bar -->

            ></path>
          </svg>

        </a>
        <a

            fill="none"

            viewBox="0 0 24 24"

            <path

            ></path>

        </a>
        <a

        >

            class="h-6 w-6"
            fill="none"
            stroke="currentColor"
            viewBox="0 0 24 24"
          >
            <path
              stroke-linecap="round"
              stroke-linejoin="round"
              stroke-width="2"
              d="M3 3h2l.4 2M7 13h10l4-8H5.4M7 13L5.4 5M7 13l-2.293 2.293c-.63.63-.182 1.706.707 1.706H17m0 0a2 2 0 100 4 2 2 0 000-4zm-8 2a2 2 0 11-4 0 2 2 0 014 0z"
            ></path>
          </svg>
          <span class="text-xs mt-1">Bazaar Cart</span>
        </a>
        <a
          href="shg.html"

            fill="none"
            stroke="currentColor"
            viewBox="0 0 24 24"
          >

    <!-- Load the data file BEFORE the main script -->
    <script src="data.js"></script>
    <script>
      const listingsContainer = document.getElementById(
        "service-listings-container"
      );
      const searchInput = document.getElementById("search-input");
      const categoryFilter = document.getElementById("category-filter");
      const locationFilter = document.getElementById("location-filter");
      const clearFiltersBtn = document.getElementById("clear-filters-btn");
      const openMenuBtn = document.getElementById("open-menu-btn");
      const closeMenuBtn = document.getElementById("close-menu-btn");
      const hamburgerMenu = document.getElementById("hamburger-menu");
      const overlay = document.getElementById("overlay");

      // --- UNIFIED WISHLIST LOGIC ---
      function getWishlist() {
        return JSON.parse(localStorage.getItem("wishlist")) || [];
      }

      function saveWishlist(wishlist) {
        localStorage.setItem("wishlist", JSON.stringify(wishlist));
      }

      function toggleWishlist(serviceId) {
        let wishlist = getWishlist();
        const itemhome = wishlist.findhome(
          (item) => item.id === serviceId && item.type === "service"
        );

        if (itemhome > -1) {
          wishlist.splice(itemhome, 1); // Remove from wishlist
        } else {
          wishlist.push({ id: serviceId, type: "service" }); // Add to wishlist
        }
        saveWishlist(wishlist);
        applyFiltersAndSearch(); // Re-render to show updated heart icon
      }

      // --- RENDER & FILTER FUNCTIONS ---
      function renderServiceListings(data) {
        const wishlist = getWishlist();
        listingsContainer.innerHTML = "";
        if (data.length === 0) {
          listingsContainer.innerHTML = `<div class="text-center p-8 bg-white rounded-xl shadow"><p class="text-gray-600">No services found matching your criteria.</p></div>`;
          return;
        }
        data.forEach((service) => {
          const isInWishlist = wishlist.some(
            (item) => item.id === service.id && item.type === "service"
          );
          const card = `
                    <div class="bg-white rounded-xl shadow-md p-4 flex items-start gap-4 hover:shadow-lg transition-shadow duration-300">
                        <a href="service-detail.html?id=${
                          service.id
                        }" class="flex-shrink-0">
                            <img src="${service.image}" alt="${
            service.name
          }" class="w-20 h-20 rounded-lg object-cover">
                        </a>
                        <div class="flex-grow min-w-0">
                            <div class="flex justify-between items-start gap-2">
                                <a href="service-detail.html?id=${
                                  service.id
                                }" class="flex-grow min-w-0">
                                    <h4 class="text-lg font-semibold text-gray-900 truncate">${
                                      service.name
                                    }</h4>
                                    <p class="text-sm text-gray-500 truncate">${
                                      service.category
                                    } | ${service.location}</p>
                                </a>
                                <button onclick="event.stopPropagation(); toggleWishlist(${
                                  service.id
                                })" class="flex-shrink-0 p-1 rounded-full z-10 hover:bg-red-50" title="Add to Wishlist">
                                    ${
                                      isInWishlist
                                        ? `<svg class="w-6 h-6 text-red-500" fill="currentColor" viewBox="0 0 20 20"><path fill-rule="evenodd" d="M3.172 5.172a4 4 0 015.656 0L10 6.343l1.172-1.171a4 4 0 115.656 5.656L10 17.657l-6.828-6.829a4 4 0 010-5.656z" clip-rule="evenodd"></path></svg>`
                                        : `<svg class="w-6 h-6 text-gray-400 hover:text-red-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4.318 6.318a4.5 4.5 0 000 6.364L12 20.364l7.682-7.682a4.5 4.5 0 00-6.364-6.364L12 7.636l-1.318-1.318a4.5 4.5 0 00-6.364 0z"></path></svg>`
                                    }
                                </button>
                            </div>
                            <a href="service-detail.html?id=${
                              service.id
                            }" class="block mt-2">
                                <p class="text-sm text-gray-600 truncate">${
                                  service.description
                                }</p>
                            </a>
                        </div>
                    </div>`;
          listingsContainer.innerHTML += card;
        });
      }

      function populateFilters() {
        const categories = [
          ...new Set(servicesData.map((s) => s.category)),
        ].sort();
        const locations = [
          ...new Set(servicesData.map((s) => s.location)),
        ].sort();

        categoryFilter.innerHTML =
          '<option value="">All Categories</option>' +
          categories.map((c) => `<option value="${c}">${c}</option>`).join("");
        locationFilter.innerHTML =
          '<option value="">All Locations</option>' +
          locations.map((l) => `<option value="${l}">${l}</option>`).join("");
      }

      function applyFiltersAndSearch() {
        const searchQuery = searchInput.value.toLowerCase();
        const selectedCategory = categoryFilter.value;
        const selectedLocation = locationFilter.value;

        let filteredData = servicesData.filter((service) => {
          const matchesSearch =
            service.name.toLowerCase().includes(searchQuery) ||
            service.description.toLowerCase().includes(searchQuery);
          const matchesCategory =
            !selectedCategory || service.category === selectedCategory;
          const matchesLocation =
            !selectedLocation || service.location === selectedLocation;
          return matchesSearch && matchesCategory && matchesLocation;
        });

        renderServiceListings(filteredData);
      }

      // --- EVENT LISTENERS ---
      searchInput.addEventListener("input", applyFiltersAndSearch);
      categoryFilter.addEventListener("change", applyFiltersAndSearch);
      locationFilter.addEventListener("change", applyFiltersAndSearch);

      clearFiltersBtn.addEventListener("click", () => {
        searchInput.value = "";
        categoryFilter.value = "";
        locationFilter.value = "";
        applyFiltersAndSearch();
      });

      function toggleHamburgerMenu() {
        hamburgerMenu.classList.toggle("-translate-x-full");
        overlay.classList.toggle("opacity-0");
        overlay.classList.toggle("pointer-events-none");
        overlay.classList.toggle("opacity-50");
      }
      openMenuBtn.addEventListener("click", toggleHamburgerMenu);
      closeMenuBtn.addEventListener("click", toggleHamburgerMenu);
      overlay.addEventListener("click", toggleHamburgerMenu);

      // --- INITIAL PAGE LOAD ---
      document.addEventListener("DOMContentLoaded", () => {
        populateFilters();
        applyFiltersAndSearch();
      });
    </script>
  </body>
</html>
